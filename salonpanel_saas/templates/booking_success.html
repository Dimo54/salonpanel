<!doctype html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zahtev poslat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="booking-body">
    <main class="success-shell">
        <section class="success-card">
            <span class="success-icon">OK</span>
            <h1>Zahtev je poslat</h1>
            <p>Hvala, {{ appointment.client_name }}. Salon ce potvrditi termin porukom ili pozivom.</p>
            <div class="success-details">
                <div><span>Usluga</span><strong>{{ appointment.service_name }}</strong></div>
                <div><span>Datum</span><strong>{{ appointment.date|date_sr }}</strong></div>
                <div><span>Vreme</span><strong>{{ appointment.time|time_short }}</strong></div>
            </div>
            <a class="btn btn-primary" href="{{ url_for('public_booking', slug=salon.slug) }}">Zakazi jos jedan termin</a>
        </section>
    </main>
</body>
</html>
