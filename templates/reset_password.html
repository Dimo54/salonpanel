<!doctype html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Nova šifra - SalonPanel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="login-body">
    <div class="login-bg"></div>
    <main class="login-wrap single-card-wrap">
        <section class="login-card">
            <div class="brand center"><span class="brand-mark">SP</span><span><strong>SalonPanel</strong><small>Nova šifra</small></span></div>
            <h2>Postavite novu šifru</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}<div class="flash-stack compact">{% for category, message in messages %}<div class="flash flash-{{ category }}">{{ message }}</div>{% endfor %}</div>{% endif %}{% endwith %}
            <form method="post" class="form-stack">
                <label>Nova šifra<input type="password" name="password" minlength="8" autocomplete="new-password" required></label>
                <label>Ponovite šifru<input type="password" name="password_confirm" minlength="8" autocomplete="new-password" required></label>
                <button class="btn btn-primary full" type="submit">Sačuvaj novu šifru</button>
            </form>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
