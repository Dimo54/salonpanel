{% extends "base.html" %}
{% block title %}Podesavanja - {{ app_name }}{% endblock %}
{% block content %}
<div class="page-head">
    <div>
        <span class="eyebrow">Biznis profil</span>
        <h1>Podesavanja</h1>
        <p class="lead">Promeni naziv salona, kontakt i tekst za javno zakazivanje.</p>
    </div>
    <a class="btn btn-secondary" href="{{ url_for('public_booking', slug=current_salon.slug) }}" target="_blank">Otvori javni link</a>
</div>

<section class="panel form-panel">
    <form method="post" class="smart-form">
        <div class="form-grid">
            <label>
                Naziv firme
                <input type="text" name="business_name" value="{{ settings.business_name }}" required>
            </label>
            <label>
                Tip firme
                <input type="text" name="business_type" value="{{ settings.business_type }}" required>
            </label>
            <label>
                Telefon
                <input type="text" name="phone" value="{{ settings.phone }}">
            </label>
            <label>
                WhatsApp broj
                <input type="text" name="whatsapp" value="{{ settings.whatsapp }}">
            </label>
            <label>
                Instagram
                <input type="text" name="instagram" value="{{ settings.instagram }}">
            </label>
            <label>
                Adresa
                <input type="text" name="address" value="{{ settings.address }}">
            </label>
            <label>
                Radno vreme
                <input type="text" name="working_hours" value="{{ settings.working_hours }}">
            </label>
            <label>
                Otvaranje
                <input type="time" name="open_time" value="{{ settings.open_time }}">
            </label>
            <label>
                Zatvaranje
                <input type="time" name="close_time" value="{{ settings.close_time }}">
            </label>
            <label>
                Slot u minutima
                <input type="number" name="slot_minutes" min="5" step="5" value="{{ settings.slot_minutes }}">
            </label>
            <label class="span-two">
                Poruka na javnoj stranici
                <textarea name="booking_note" rows="4">{{ settings.booking_note }}</textarea>
            </label>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" type="submit">Sacuvaj podesavanja</button>
        </div>
    </form>
</section>
{% endblock %}
